<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres — SophroCR</title>
<style>
:root {
  --teal:      #2E7D8A;
  --teal-dark: #235f69;
  --teal-light:#E8F4F6;
  --plum:      #5B3A6E;
  --dark:      #1A1A1A;
  --gray:      #666666;
  --gray-light:#F5F5F5;
  --border:    #E0E0E0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Calibri, "Segoe UI", Arial, sans-serif; background: var(--gray-light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }

.app-header { background: var(--teal); padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.header-inner { max-width: 820px; margin: 0 auto; height: 60px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
.brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.brand-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; font-size: 14px; font-weight: bold; color: white; flex-shrink: 0; }
.brand-name { font-family: Georgia, serif; font-size: 18px; color: white; font-weight: bold; }
.header-center { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; text-align: center; }
.header-right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; }
.header-link { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; }
.header-link:hover { color: white; }

.page { flex: 1; max-width: 820px; margin: 0 auto; width: 100%; padding: 36px 24px 80px; }

h1 { font-family: Georgia, serif; font-size: 22px; color: var(--teal); font-weight: bold; border-bottom: 2px solid var(--teal); padding-bottom: 10px; margin-bottom: 28px; }

section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 22px 26px; margin-bottom: 16px; }
section h2 { font-family: Georgia, serif; font-size: 15px; color: var(--teal); font-weight: bold; margin-bottom: 16px; }
p { font-size: 14px; line-height: 1.65; color: var(--dark); }
p + p { margin-top: 10px; }

label { display: block; font-size: 11.5px; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; margin-top: 14px; }
label:first-of-type { margin-top: 0; }
input[type="password"] { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 15px; color: var(--dark); transition: border-color .15s; }
input[type="password"]:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(46,125,138,.12); }

.btn { margin-top: 20px; padding: 11px 28px; background: var(--teal); color: white; border: none; border-radius: 7px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn:hover { background: var(--teal-dark); }
.btn:disabled { opacity: 0.6; cursor: default; }

.msg { margin-top: 14px; padding: 10px 14px; border-radius: 7px; font-size: 13.5px; display: none; }
.msg.success { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
.msg.error   { background: #FFEBEE; color: #B00020; border: 1px solid #FFCDD2; }

.site-footer { border-top: 1px solid var(--border); background: white; padding: 14px 24px; text-align: center; font-size: 12px; color: #AAAAAA; line-height: 1.8; margin-top: auto; }
.site-footer a { color: #AAAAAA; text-decoration: none; }
.site-footer a:hover { color: var(--teal); }
.footer-sep { margin: 0 7px; }

@media (max-width: 600px) {
  .page { padding: 20px 14px 60px; }
  section { padding: 16px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <a class="brand" href="/">
      <div class="brand-logo">SC</div>
      <div class="brand-name">SophroCR</div>
    </a>
    <a class="header-center" href="https://sophroslous.fr" target="_blank" rel="noopener">sophroslous.fr</a>
    <div class="header-right">
      <a class="header-link" href="/logout" style="opacity:0.6; font-size:12px;">Déconnexion</a>
    </div>
  </div>
</header>

<div class="page">
  <h1>Paramètres</h1>

  <section>
    <h2>Changer le mot de passe</h2>
    <p>Le nouveau mot de passe sera actif immédiatement. Votre session reste ouverte.</p>

    <form id="pwdForm" autocomplete="on">
      <input type="text" name="username" value="vanessa" autocomplete="username"
        tabindex="-1" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;">

      <label for="current">Mot de passe actuel</label>
      <input type="password" id="current" name="current-password" autocomplete="current-password" placeholder="••••••••">

      <label for="next">Nouveau mot de passe</label>
      <input type="password" id="next" name="new-password" autocomplete="new-password" placeholder="Min. 8 caractères">

      <label for="confirm">Confirmer le nouveau mot de passe</label>
      <input type="password" id="confirm" name="confirm-password" autocomplete="new-password" placeholder="••••••••">

      <button type="submit" class="btn" id="submitBtn">Enregistrer</button>
    </form>

    <div class="msg" id="msg"></div>
  </section>
</div>

<footer class="site-footer">
  Vanessa Slous · Sophrologue caycédienne
  <span class="footer-sep">·</span>
  <a href="https://sophroslous.fr" target="_blank" rel="noopener">sophroslous.fr</a>
  <span class="footer-sep">·</span>
  <a href="/">← Retour à l'outil SophroCR</a>
</footer>

<script>
document.getElementById('pwdForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const current = document.getElementById('current').value;
  const next    = document.getElementById('next').value;
  const confirm = document.getElementById('confirm').value;
  const msg     = document.getElementById('msg');
  const btn     = document.getElementById('submitBtn');

  msg.style.display = 'none';

  if (next !== confirm) {
    msg.textContent = 'Les deux nouveaux mots de passe ne correspondent pas.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  if (next.length < 8) {
    msg.textContent = 'Le nouveau mot de passe doit contenir au moins 8 caractères.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  try {
    const res = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current, next })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = 'Mot de passe modifié avec succès.';
      msg.className = 'msg success';
      document.getElementById('pwdForm').reset();
    } else {
      msg.textContent = data.error || 'Une erreur est survenue.';
      msg.className = 'msg error';
    }
  } catch {
    msg.textContent = 'Impossible de contacter le serveur.';
    msg.className = 'msg error';
  }

  msg.style.display = 'block';
  btn.disabled = false;
  btn.textContent = 'Enregistrer';
});
</script>

</body>
</html>
